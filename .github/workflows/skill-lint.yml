name: Skill Linting

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  lint-skills:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install

      - name: Lint Skill Metadata (Blocking)
        run: bun lint:skills:meta

      - name: Lint Skill Structure (Warning)
        run: bun lint:skills:pkg || true

      - name: Audit Skill Quality (Informational)
        run: bun lint:skills:quality || true
