name: Sia Skill Test Suite

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Setup Mise
        uses: jdx/mise-action@v2

      - name: Install dependencies
        run: bun install

      - name: Run Promptfoo (Deterministic)
        run: bun run test:promptfoo:ci

      - name: Setup Python for DeepEval
        run: |
          mise exec -- pip install -r packages/sia-deepeval/requirements.txt

      - name: Run DeepEval (Metrics)
        run: bun run test:deepeval
        env:
          OPENAI_API_KEY: ${{ secrets.OPENAI_API_KEY }}
          GROQ_API_KEY: ${{ secrets.GROQ_API_KEY }}
          GEMINI_API_KEY: ${{ secrets.GEMINI_API_KEY }}
